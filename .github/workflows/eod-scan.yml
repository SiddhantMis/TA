name: EOD Stock Screener

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 13:30 UTC = 7:00 PM IST, after Yahoo EOD data is expected
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pattern detection tests
        run: python test_patterns.py

      - name: Run screener
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit results to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # This run's own computed output, saved OUTSIDE the git working
          # tree before any retry loop touches it. A concurrent run (the
          # scheduled trigger and a manual one overlapping is a real,
          # recurring scenario) writes different market data to the same
          # file path -- that's not a mergeable diff, it's two different
          # snapshots, and a rebase/merge attempt WILL hit a genuine
          # content conflict (verified this by simulating the collision
          # locally before writing this: a plain rebase-retry reliably
          # failed with "CONFLICT (content)" on exactly this file, so it
          # doesn't just theoretically apply here). On rejection: reset to
          # whatever the winning run pushed, then re-apply THIS run's
          # output on top -- never attempt to reconcile the two.
          cp docs/latest_screen.json /tmp/this_run_output.json
          for attempt in 1 2 3 4 5; do
            cp /tmp/this_run_output.json docs/latest_screen.json
            git add docs/latest_screen.json
            if git diff --staged --quiet; then
              echo "no changes to commit"
              exit 0
            fi
            git commit -q -m "Update screen results [skip ci]"
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt/5) -- another run committed first. Resetting to latest main and re-applying this run's output, not merging."
            git fetch origin main
            git reset -q --hard origin/main
            sleep $((attempt * 3))
          done
          echo "push failed after 5 attempts"
          exit 1

      - name: Upload results as artifact too
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-screen
          path: docs/latest_screen.json