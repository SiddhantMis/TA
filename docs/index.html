<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TA Screener — Latest Results</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 24px; background: #0f1117; color: #e6e6e6; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .meta { color: #9aa0aa; font-size: 13px; margin-bottom: 20px; }
  .note { background: #1c2030; border-left: 3px solid #5b8def; padding: 10px 14px; font-size: 13px; margin-bottom: 20px; color: #cfd4de; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #262b3a; vertical-align: top; }
  th { color: #9aa0aa; font-weight: 600; position: sticky; top: 0; background: #0f1117; }
  tr.flagged { background: #1a2a1f; }
  .conf-high { color: #4ade80; font-weight: 600; }
  .conf-mid { color: #facc15; }
  .conf-low { color: #9aa0aa; }
  .notes-list { margin: 0; padding-left: 16px; color: #9aa0aa; font-size: 12px; }
  .err { color: #f87171; }
  .refresh { font-size: 12px; color: #5b8def; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
  <h1>TA Screener — Latest Results</h1>
  <div class="meta" id="meta">Loading…</div>
  <div class="note" id="note"></div>
  <div id="content"></div>

  <script>
    // Read-only, no trigger, no add-stock form, no token anywhere in
    // this file. It fetches whatever main.py last committed — nothing
    // more. If you want a fresh run, use the Actions tab, same as
    // always; this page just shows what already happened.
    async function load() {
      const meta = document.getElementById('meta');
      const noteEl = document.getElementById('note');
      const content = document.getElementById('content');
      try {
        const res = await fetch('latest_screen.json?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const runTime = data.run_timestamp ? new Date(data.run_timestamp) : null;
        meta.innerHTML = runTime
          ? `Data as of run at ${runTime.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })}`
          : 'Run timestamp unavailable';
        noteEl.textContent = data.note || '';

        const rows = (data.all || []).slice().sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
        if (rows.length === 0) {
          content.innerHTML = '<p>No data yet — run the workflow at least once.</p>';
          return;
        }

        const confClass = c => c >= 60 ? 'conf-high' : c >= 35 ? 'conf-mid' : 'conf-low';

        // touches is null exactly when a level came from the rolling
        // min/max fallback, not a real pivot cluster -- a real cluster
        // always has >=1 member, so null is the only value that means
        // "not a tested zone" without being ambiguous with a genuine
        // thin-but-real result.
        const fmtLevel = (level, touches) => {
          if (level == null) return '—';
          if (touches == null) return `${level} (est.)`;
          return `${level} (${touches}x)`;
        };
        const fmtLadder = (ladder, primaryLevel) => {
          if (!ladder || ladder.length === 0) return '';
          const rest = ladder.filter(l => l.level !== primaryLevel);
          if (rest.length === 0) return '';
          return `<br><span style="color:#7a8194;font-size:11px">also: ${rest.map(l => `${l.level} (${l.touches}x)`).join(', ')}</span>`;
        };

        const html = `
          <table>
            <thead>
              <tr>
                <th>Ticker</th><th>Date</th><th>Close</th><th>Trend</th>
                <th>Pattern</th><th>Support</th><th>Resistance</th>
                <th>Vol×</th><th>RSI</th><th>Checks</th><th>Confidence</th>
                <th>Read</th><th>Notes</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr class="${r.flag ? 'flagged' : ''}">
                  <td><strong>${r.ticker}</strong></td>
                  <td>${r.date}${r.data_stale_days != null && r.data_stale_days > 1 ? ` <span class="err">(${r.data_stale_days}d stale)</span>` : ''}</td>
                  <td>${r.close}</td>
                  <td>${r.trend}${r.trend_r2 != null ? ` (R²=${r.trend_r2})` : ''}</td>
                  <td>${r.pattern || '—'}</td>
                  <td>${fmtLevel(r.support_level, r.support_touches)}${fmtLadder(r.support_ladder, r.support_level)}</td>
                  <td>${fmtLevel(r.resistance_level, r.resistance_touches)}${fmtLadder(r.resistance_ladder, r.resistance_level)}</td>
                  <td>${r.volume_ratio ?? '—'}</td>
                  <td>${r.rsi ?? '—'}</td>
                  <td>${r.checks_passed}/${r.checks_total}</td>
                  <td class="${confClass(r.confidence || 0)}">${r.confidence ?? '—'}</td>
                  <td>${r.recommendation || '—'}</td>
                  <td><ul class="notes-list">${(r.notes || []).map(n => `<li>${n}</li>`).join('')}</ul></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        content.innerHTML = html;
      } catch (err) {
        meta.innerHTML = `<span class="err">Failed to load latest_screen.json — ${err.message}</span>`;
        content.innerHTML = '<p>Check that the workflow has run at least once and committed docs/latest_screen.json.</p>';
      }
    }
    load();
  </script>
</body>
</html>
